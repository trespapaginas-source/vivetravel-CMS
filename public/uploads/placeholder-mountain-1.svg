<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="mtSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="40%" stop-color="#3b82a0"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="mtGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="400" fill="url(#mtSky)"/>
  <!-- Far mountains -->
  <polygon points="0,300 120,180 240,300" fill="#1a6b3c" opacity="0.5"/>
  <polygon points="180,300 320,150 460,300" fill="#15803d" opacity="0.5"/>
  <polygon points="400,300 560,170 720,300" fill="#1a6b3c" opacity="0.5"/>
  <polygon points="600,300 740,200 800,260 800,300" fill="#15803d" opacity="0.5"/>
  <!-- Snow caps -->
  <polygon points="320,150 290,195 350,195" fill="white" opacity="0.7"/>
  <polygon points="560,170 535,205 585,205" fill="white" opacity="0.6"/>
  <!-- Near mountains -->
  <polygon points="0,400 100,240 200,400" fill="url(#mtGreen)" opacity="0.8"/>
  <polygon points="150,400 300,220 450,400" fill="#16a34a" opacity="0.8"/>
  <polygon points="350,400 520,250 690,400" fill="url(#mtGreen)" opacity="0.8"/>
  <polygon points="600,400 730,280 800,350 800,400" fill="#16a34a" opacity="0.8"/>
  <!-- Forest base -->
  <path d="M0 350 Q200 330 400 350 Q600 370 800 350 L800 400 L0 400Z" fill="#15803d" opacity="0.6"/>
  <!-- Trees silhouettes -->
  <polygon points="50,340 58,300 66,340" fill="#166534" opacity="0.6"/>
  <polygon points="80,345 90,295 100,345" fill="#14532d" opacity="0.5"/>
  <polygon points="700,345 710,300 720,345" fill="#166534" opacity="0.6"/>
  <polygon points="740,348 748,310 756,348" fill="#14532d" opacity="0.5"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="80" rx="70" ry="22" fill="white" opacity="0.3"/>
  <ellipse cx="240" cy="75" rx="45" ry="16" fill="white" opacity="0.25"/>
  <!-- Label -->
  <rect x="200" y="155" width="400" height="55" rx="10" fill="rgba(0,0,0,0.4)"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="white" letter-spacing="2">SIERRA NEVADA</text>
</svg>