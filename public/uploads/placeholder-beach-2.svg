<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <!-- Ocean background -->
  <rect width="800" height="400" fill="url(#ocean)"/>
  <!-- Light rays -->
  <polygon points="300,0 350,400 250,400" fill="white" opacity="0.05"/>
  <polygon points="450,0 520,400 380,400" fill="white" opacity="0.04"/>
  <polygon points="600,0 680,400 520,400" fill="white" opacity="0.03"/>
  <!-- Coral formations -->
  <ellipse cx="150" cy="380" rx="80" ry="40" fill="#f43f5e" opacity="0.5"/>
  <ellipse cx="160" cy="370" rx="50" ry="30" fill="#fb7185" opacity="0.4"/>
  <ellipse cx="350" cy="390" rx="60" ry="30" fill="#e11d48" opacity="0.4"/>
  <ellipse cx="600" cy="385" rx="90" ry="35" fill="#f43f5e" opacity="0.45"/>
  <ellipse cx="620" cy="375" rx="55" ry="25" fill="#fb7185" opacity="0.35"/>
  <!-- Seaweed -->
  <path d="M100 400 Q90 350 105 300 Q115 260 100 220" stroke="#22c55e" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M110 400 Q120 355 108 310 Q98 270 112 240" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M500 400 Q490 340 505 290 Q515 250 500 210" stroke="#22c55e" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M700 400 Q710 350 698 300 Q688 260 702 230" stroke="#16a34a" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Bubbles -->
  <circle cx="300" cy="150" r="6" fill="white" opacity="0.3"/>
  <circle cx="320" cy="120" r="4" fill="white" opacity="0.25"/>
  <circle cx="290" cy="100" r="8" fill="white" opacity="0.2"/>
  <circle cx="550" cy="180" r="5" fill="white" opacity="0.3"/>
  <circle cx="570" cy="150" r="7" fill="white" opacity="0.2"/>
  <circle cx="540" cy="120" r="4" fill="white" opacity="0.25"/>
  <!-- Fish -->
  <ellipse cx="400" cy="130" rx="18" ry="10" fill="#fbbf24" opacity="0.6"/>
  <polygon points="418,130 430,120 430,140" fill="#fbbf24" opacity="0.5"/>
  <circle cx="390" cy="128" r="2" fill="#1e293b" opacity="0.6"/>
  <ellipse cx="250" cy="200" rx="14" ry="8" fill="#38bdf8" opacity="0.5"/>
  <polygon points="264,200 274,193 274,207" fill="#38bdf8" opacity="0.4"/>
  <!-- Label -->
  <rect x="225" y="155" width="350" height="55" rx="10" fill="rgba(0,0,0,0.35)"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="white" letter-spacing="2">ARRECIFE</text>
</svg>